<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寬悅團隊系統 - 行動優化版</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --main-orange: #ff4500; --bg-light: #f4f6f9; --danger: #e74c3c; --sidebar-w: 220px; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg-light); margin: 0; display: flex; min-height: 100vh; color: #333; }
        
        /* 登入樣式 */
        #loginPage { position: fixed; inset: 0; background: var(--main-orange); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        /* 側邊欄 (電腦版顯示) */
        .sidebar { width: var(--sidebar-w); background: white; border-right: 1px solid #ddd; position: fixed; height: 100%; display: flex; flex-direction: column; padding-top: 20px; z-index: 100; }
        
        /* 手機版底部導航 (預設隱藏) */
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #ddd; z-index: 1000; height: 60px; justify-content: space-around; align-items: center; }
        .m-nav-item { flex: 1; text-align: center; font-size: 12px; color: #666; cursor: pointer; border: none; background: none; height: 100%; }
        .m-nav-item.active { color: var(--main-orange); font-weight: bold; }

        /* 主內容區 */
        .main-content { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; padding-bottom: 20px; }
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; sticky: top; }
        .search-container { background: white; padding: 10px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
        .search-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }

        /* 表格與卡片控制 */
        .container { padding: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        th { background: #fff5f0; color: var(--main-orange); padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        /* 手機適應 CSS */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { margin-left: 0; padding-bottom: 80px; }
            header h2 { font-size: 18px; }
            
            /* 表格轉卡片 */
            table thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; box-sizing: border-box; }
            tr { margin-bottom: 15px; border: 1px solid #eee; border-radius: 10px; padding: 5px; }
            td { border: none; padding: 8px 12px; }
            td::before { content: attr(data-label); font-weight: bold; color: #999; display: block; font-size: 11px; margin-bottom: 2px; }
            .tr-case-name { font-size: 16px; color: var(--main-orange); font-weight: bold; }
        }

        /* Modal 樣式 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: flex-end; z-index: 2000; }
        .modal-content { background: white; width: 100%; max-width: 800px; padding: 25px; border-radius: 20px 20px 0 0; max-height: 92vh; overflow-y: auto; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .form-group label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .readonly-val { font-size: 16px; font-weight: bold; border-bottom: 1px solid #f0f0f0; padding: 5px 0; min-height: 24px; word-break: break-all; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-orange { background: var(--main-orange); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-blue { background: #3498db; color: white; width: 100%; }
        .badge-coop { background: #fff0eb; color: var(--main-orange); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        /* 筆記樣式 */
        .note-item { position: relative; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--main-orange); }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-box">
        <h2 style="color:var(--main-orange); margin-bottom: 20px;">寬悅團隊系統</h2>
        <input type="text" id="loginAcc" placeholder="請輸入帳號" spellcheck="false">
        <input type="password" id="loginPass" placeholder="請輸入密碼">
        <button class="btn btn-orange" style="width:100%; margin-top:15px;" onclick="handleLogin()">登入系統</button>
    </div>
</div>

<div class="sidebar">
    <div class="user-tag"><span id="displayUser" style="font-weight: bold; color: var(--main-orange); font-size: 18px;"></span></div>
    <div class="nav-label">個人管理</div>
    <button class="tab-btn active" onclick="setTab('all', this)">📁 全部物件</button>
    <button class="tab-btn" onclick="setTab('tracking', this)">⏳ 追蹤中</button>
    <button class="tab-btn" onclick="setTab('signed', this)">✍️ 委託中</button>
    <button class="tab-btn" onclick="setTab('sold', this)">🏁 已售出</button>
    <div class="nav-label" style="margin-top:20px;">團隊公海</div>
    <button class="tab-btn" onclick="setTab('cooperation', this)">🤝 合作物件</button>
    <button class="tab-btn" style="margin-top:auto; color:#ccc;" onclick="location.reload()">🚪 登出系統</button>
</div>

<div class="mobile-nav" id="mNav">
    <button class="m-nav-item active" onclick="setTab('all', this)">全部</button>
    <button class="m-nav-item" onclick="setTab('tracking', this)">追蹤</button>
    <button class="m-nav-item" onclick="setTab('signed', this)">委託</button>
    <button class="m-nav-item" onclick="setTab('cooperation', this)">公海</button>
    <button class="m-nav-item" onclick="location.reload()">登出</button>
</div>

<div class="main-content">
    <header>
        <h2 id="pageTitle" style="margin:0;">我的開發清單</h2>
        <button class="btn btn-orange" onclick="openAddModal()">＋ 新增</button>
    </header>
    
    <div class="search-container">
        <input type="text" id="tableSearch" class="search-input" placeholder="🔍 搜尋案名、姓名、電話、社區..." oninput="renderTable()">
    </div>

    <div class="container">
        <table id="mainTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="caseModal" class="modal">
    <div class="modal-content">
        <div style="width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin: -10px auto 20px;"></div>
        
        <div id="viewMode">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                <h3 id="v_case_name" style="color:var(--main-orange); margin:0; font-size: 20px;"></h3>
                <button id="editBtn" class="btn" style="background:#eee; padding:5px 15px;" onclick="switchToEdit()">✎ 編輯</button>
            </div>
            <div class="form-row">
                <div class="form-group"><label>屋主姓名</label><div id="v_name" class="readonly-val"></div></div>
                <div class="form-group">
                    <label>聯絡電話</label>
                    <div id="v_phone" class="readonly-val" style="color:var(--danger)"></div>
                    <button id="viewPhoneBtn" class="btn btn-blue" style="margin-top:5px; display:none;" onclick="requestCoop()">🔓 解鎖查看</button>
                </div>
            </div>
            <div class="form-group"><label>同業網址 (點擊開啟)</label><div id="v_web_url" class="readonly-val" style="color:#3498db; text-decoration: underline;" onclick="openUrl()"></div></div>
            <div class="form-group"><label>物件地址</label><div id="v_addr" class="readonly-val"></div></div>
            <div class="form-group"><label>戶籍地址</label><div id="v_h_addr" class="readonly-val"></div></div>
            <div class="form-row">
                <div class="form-group"><label>坪數/單價</label><div id="v_size_unit" class="readonly-val"></div></div>
                <div class="form-group"><label>車位資訊</label><div id="v_parking" class="readonly-val"></div></div>
            </div>
            
            <div id="noteArea" style="margin-top:15px; border-top: 1px solid #eee; padding-top: 15px;">
                <h4 style="margin: 0 0 10px 0;">跟進筆記</h4>
                <div id="noteList" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
                <textarea id="new_note" placeholder="輸入筆記內容..." style="width:100%; height: 60px; border:1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box;"></textarea>
                <button class="btn btn-orange" style="width:100%; margin-top:8px;" onclick="addNote()">儲存筆記</button>
            </div>
        </div>

        <div id="editMode" style="display:none;">
            <h3 style="color:var(--main-orange); margin-top: 0;" id="editModalTitle">案件錄入</h3>
            <div class="form-group"><label>案名</label><input type="text" id="m_case_name"></div>
            <div class="form-row">
                <div class="form-group"><label>社區</label><input type="text" id="m_community"></div>
                <div class="form-group"><label>屋主</label><input type="text" id="m_name"></div>
            </div>
            <div class="form-group"><label>電話</label><input type="tel" id="m_phone"></div>
            <div class="form-group"><label>同業網址</label><input type="url" id="m_web_url" placeholder="https://..."></div>
            <div class="form-group"><label>物件地址</label><input type="text" id="m_addr"></div>
            <div class="form-group"><label>戶籍地址</label><input type="text" id="m_h_addr"></div>
            <div class="form-row">
                <div class="form-group"><label>坪數</label><input type="number" id="m_size" oninput="calcUnit()"></div>
                <div class="form-group"><label>車位形式</label>
                    <select id="m_p_type">
                        <option value="無">無</option>
                        <option value="坡道平面">坡道平面</option>
                        <option value="坡道機械">坡道機械</option>
                        <option value="機械平面">機械平面</option>
                        <option value="機械機械">機械機械</option>
                        <option value="塔式車位">塔式車位</option>
                        <option value="子母車位">子母車位</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>總價(萬)</label><input type="number" id="m_total" oninput="calcUnit()"></div>
                <div class="form-group"><label>車位價(萬)</label><input type="number" id="m_p_price" oninput="calcUnit()"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>單價(萬/坪)</label><input type="text" id="m_unit" readonly style="background:#f9f9f9"></div>
                <div class="form-group"><label>狀態</label>
                    <select id="m_status">
                        <option value="tracking">追蹤中</option>
                        <option value="signed">委託中</option>
                        <option value="sold">已售出</option>
                        <option value="cooperation">🤝 合作物件</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="delCaseBtn" class="btn btn-danger" onclick="deleteCase()">🗑️ 刪除</button>
                <button class="btn btn-orange" style="flex:1;" onclick="saveCase()">儲存送出</button>
            </div>
            <button class="btn" style="width:100%; margin-top:10px; background:#ddd;" onclick="switchToView()">取消</button>
        </div>
        <button class="btn" style="width:100%; margin-top:15px; background:none; color:#999;" onclick="closeModal()">關閉視窗</button>
    </div>
</div>

<script>
    // --- Firebase 配置 (請保持您原有的資訊) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAvJmCv72H9Ic5taR7YCqwsU3kEgEV218g",
        authDomain: "kuanyue-crm.firebaseapp.com",
        databaseURL: "https://kuanyue-crm-default-rtdb.firebaseio.com",
        projectId: "kuanyue-crm",
        storageBucket: "kuanyue-crm.firebasestorage.app",
        messagingSenderId: "619902000071",
        appId: "1:619902000071:web:9f38574fea1175869057e2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('kyCases_Cloud');

    let cases = [];
    let caseKeys = []; 
    let currentUser = null;
    let currentIdx = null;
    let currentFilter = 'all';

    async function handleLogin() {
        const acc = document.getElementById('loginAcc').value;
        const pass = document.getElementById('loginPass').value;
        if (!acc || !pass) return alert("請輸入帳號密碼");
        const userRef = firebase.database().ref('users/' + acc);
        try {
            const snapshot = await userRef.once('value');
            const userData = snapshot.val();
            if (userData && userData.pass === pass) {
                currentUser = { acc: acc, ...userData };
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('displayUser').innerText = acc + (userData.role==='admin'?' (管)':'');
                db.on('value', (snap) => {
                    const data = snap.val();
                    cases = data ? Object.values(data) : [];
                    caseKeys = data ? Object.keys(data) : [];
                    renderTable();
                });
            } else alert("密碼錯誤");
        } catch (e) { alert("讀取權限錯誤"); }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const searchTxt = document.getElementById('tableSearch').value.toLowerCase();
        tbody.innerHTML = '';
        const thead = document.getElementById('tableHead');
        
        // 電腦版表頭
        thead.innerHTML = currentFilter === 'cooperation' 
            ? `<tr><th>案名/社區</th><th>屋主</th><th>電話</th><th>夥伴</th></tr>`
            : `<tr><th>案名/社區</th><th>屋主</th><th>電話</th><th>總價/單價</th></tr>`;

        cases.forEach((item, idx) => {
            const isCategoryMatch = (currentFilter === 'cooperation' && item.status === 'cooperation') ||
                                    (currentFilter === 'all' && item.owner === currentUser.acc && item.status !== 'cooperation') ||
                                    (item.owner === currentUser.acc && item.status === currentFilter);
            if (!isCategoryMatch) return;
            const isSearchMatch = item.case_name.toLowerCase().includes(searchTxt) ||
                                 item.community.toLowerCase().includes(searchTxt) ||
                                 item.name.toLowerCase().includes(searchTxt) ||
                                 item.phone.includes(searchTxt);
            if (!isSearchMatch) return;

            const canSeeAll = (currentUser.role === 'admin' || item.owner === currentUser.acc || item.partner === currentUser.acc);
            const tr = document.createElement('tr');
            tr.onclick = () => openViewModal(idx);
            
            if (window.innerWidth <= 768) {
                // 手機卡片格式
                tr.innerHTML = `
                    <td class="tr-case-name">${item.case_name} <small style="color:#666">(${item.community})</small></td>
                    <td data-label="屋主">${item.name}</td>
                    <td data-label="電話">${canSeeAll ? `<a href="tel:${item.phone}">${item.phone}</a>` : '09********'}</td>
                    <td data-label="${currentFilter==='cooperation'?'夥伴':'單價'}">
                        ${currentFilter === 'cooperation' ? `<span class="badge-coop">${item.partner || '開放中'}</span>` : `${item.total}萬 / ${item.unit}萬`}
                    </td>
                `;
            } else {
                // 電腦表格格式
                if (currentFilter === 'cooperation') {
                    tr.innerHTML = `<td><b>${item.case_name}</b><br><small>${item.community}</small></td><td>${item.name}</td><td>${canSeeAll ? item.phone : '09********'}</td><td><span class="badge-coop">${item.partner || '開放中'}</span></td>`;
                } else {
                    tr.innerHTML = `<td><b>${item.case_name}</b><br><small>${item.community}</small></td><td>${item.name}</td><td>${item.phone}</td><td>${item.total}萬 / <span style="color:var(--danger)">${item.unit}萬</span></td>`;
                }
            }
            tbody.appendChild(tr);
        });
    }

    function openAddModal() {
        currentIdx = null;
        ['m_case_name','m_community','m_name','m_phone','m_addr','m_h_addr','m_size','m_p_price','m_total','m_unit','m_web_url','new_note'].forEach(f => document.getElementById(f).value = "");
        document.getElementById('m_p_type').value = "無";
        document.getElementById('m_status').value = "tracking";
        document.getElementById('delCaseBtn').style.display = 'none';
        document.getElementById('viewMode').style.display = 'none'; 
        document.getElementById('editMode').style.display = 'block'; 
        document.getElementById('caseModal').style.display = 'flex'; 
    }

    function openViewModal(idx) {
        currentIdx = idx;
        const item = cases[idx];
        const canSee = (currentUser.role === 'admin' || item.owner === currentUser.acc || item.partner === currentUser.acc);
        document.getElementById('v_case_name').innerText = item.case_name;
        document.getElementById('v_name').innerText = item.name;
        document.getElementById('v_web_url').innerText = item.web_url || "無";
        document.getElementById('v_addr').innerText = canSee ? item.addr : "解鎖後查看";
        document.getElementById('v_h_addr').innerText = canSee ? item.h_addr : "解鎖後查看";
        document.getElementById('v_size_unit').innerText = `${item.size} 坪 / ${item.unit} 萬`;
        document.getElementById('v_parking').innerText = `${item.p_type} / ${item.p_price} 萬`;
        document.getElementById('v_phone').innerText = canSee ? item.phone : "09********";
        
        const vBtn = document.getElementById('viewPhoneBtn');
        vBtn.style.display = canSee ? 'none' : 'block';
        vBtn.disabled = !!item.partner;
        vBtn.innerText = item.partner ? `已由 ${item.partner} 合作` : "🔓 解鎖查看";

        document.getElementById('noteArea').style.display = canSee ? 'block' : 'none';
        if(canSee) renderNotes(item.notes || []);
        document.getElementById('editBtn').style.display = (currentUser.role === 'admin' || item.owner === currentUser.acc) ? 'block' : 'none';
        switchToView();
        document.getElementById('caseModal').style.display = 'flex';
    }

    function openUrl() {
        const url = cases[currentIdx].web_url;
        if(url && url.startsWith('http')) window.open(url, '_blank');
    }

    function switchToView() { document.getElementById('editMode').style.display = 'none'; document.getElementById('viewMode').style.display = 'block'; }
    function switchToEdit() {
        const item = cases[currentIdx];
        document.getElementById('m_case_name').value = item.case_name;
        document.getElementById('m_community').value = item.community;
        document.getElementById('m_name').value = item.name;
        document.getElementById('m_phone').value = item.phone;
        document.getElementById('m_web_url').value = item.web_url || "";
        document.getElementById('m_addr').value = item.addr;
        document.getElementById('m_h_addr').value = item.h_addr;
        document.getElementById('m_size').value = item.size;
        document.getElementById('m_p_type').value = item.p_type;
        document.getElementById('m_total').value = item.total;
        document.getElementById('m_p_price').value = item.p_price;
        document.getElementById('m_unit').value = item.unit;
        document.getElementById('m_status').value = item.status;
        document.getElementById('delCaseBtn').style.display = (currentUser.role === 'admin' || item.owner === currentUser.acc) ? 'block' : 'none';
        document.getElementById('viewMode').style.display = 'none'; 
        document.getElementById('editMode').style.display = 'block';
    }

    function saveCase() {
        const newData = {
            case_name: document.getElementById('m_case_name').value || "未命名",
            community: document.getElementById('m_community').value || "",
            name: document.getElementById('m_name').value || "",
            phone: document.getElementById('m_phone').value || "",
            web_url: document.getElementById('m_web_url').value || "",
            addr: document.getElementById('m_addr').value || "",
            h_addr: document.getElementById('m_h_addr').value || "",
            size: document.getElementById('m_size').value || 0,
            p_type: document.getElementById('m_p_type').value || "無",
            p_price: document.getElementById('m_p_price').value || 0,
            total: document.getElementById('m_total').value || 0,
            unit: document.getElementById('m_unit').value || 0,
            status: document.getElementById('m_status').value || "tracking",
            owner: currentIdx !== null ? cases[currentIdx].owner : currentUser.acc,
            partner: currentIdx !== null ? (cases[currentIdx].partner || null) : null,
            notes: currentIdx !== null ? (cases[currentIdx].notes || []) : []
        };
        if (currentIdx === null) db.push(newData);
        else db.child(caseKeys[currentIdx]).set(newData);
        closeModal();
    }

    function deleteCase() {
        if (confirm("確定刪除？此動作無法復原。")) { db.child(caseKeys[currentIdx]).remove(); closeModal(); }
    }

    function renderNotes(notes) {
        document.getElementById('noteList').innerHTML = notes.map((n, i) => `
            <div class="note-item">
                <b style="color:var(--main-orange)">${n.user}</b> <small style="color:#999">${n.date}</small>
                <div style="margin-top:5px">${n.text}</div>
                ${(currentUser.role === 'admin' || n.user === currentUser.acc) ? `<span style="position:absolute; right:10px; top:10px; color:#ccc;" onclick="deleteNote(${i})">×</span>` : ''}
            </div>`).join('');
    }

    function addNote() {
        const txt = document.getElementById('new_note').value;
        if(!txt) return;
        const item = cases[currentIdx];
        if(!item.notes) item.notes = [];
        item.notes.unshift({date: new Date().toLocaleString(), user: currentUser.acc, text: txt});
        db.child(caseKeys[currentIdx]).set(item);
        document.getElementById('new_note').value = "";
    }

    function deleteNote(nIdx) {
        if (!confirm("刪除筆記？")) return;
        const item = cases[currentIdx];
        item.notes.splice(nIdx, 1);
        db.child(caseKeys[currentIdx]).set(item);
        renderNotes(item.notes);
    }

    function requestCoop() {
        if (!confirm("確定要申請合作並查看詳情嗎？")) return;
        const item = cases[currentIdx];
        item.partner = currentUser.acc;
        if(!item.notes) item.notes = [];
        item.notes.unshift({date: new Date().toLocaleString(), user: '系統', text: `[合作] ${currentUser.acc} 申請合作查閱。`});
        db.child(caseKeys[currentIdx]).set(item);
        openViewModal(currentIdx);
    }

    function calcUnit() {
        const s = parseFloat(document.getElementById('m_size').value) || 0;
        const t = parseFloat(document.getElementById('m_total').value) || 0;
        const p = parseFloat(document.getElementById('m_p_price').value) || 0;
        document.getElementById('m_unit').value = s > 0 ? ((t - p) / s).toFixed(2) : 0;
    }

    function setTab(s, el) { 
        document.querySelectorAll('.tab-btn, .m-nav-item').forEach(b => b.classList.remove('active')); 
        el.classList.add('active'); 
        currentFilter = s; 
        document.getElementById('pageTitle').innerText = (s==='cooperation'?'🤝 團隊公海':'📁 物件管理');
        renderTable(); 
    }
    function closeModal() { document.getElementById('caseModal').style.display = 'none'; }
    
    // 監聽視窗縮放以切換顯示
    window.addEventListener('resize', renderTable);
</script>
</body>
</html>
